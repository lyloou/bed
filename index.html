<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>LOU-BED</title>
  <style>
    :root {
      --ink: #11110f;
      --ink-soft: #191916;
      --paper: #f2efe8;
      --paper-dim: #c9c1b2;
      --line: rgba(242, 239, 232, 0.16);
      --line-strong: rgba(242, 239, 232, 0.32);
      --accent: #d5ff4f;
      --accent-2: #ff6b3d;
      --shadow: 0 26px 70px rgba(0, 0, 0, 0.36);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(242, 239, 232, 0.035) 1px, transparent 1px) 0 0 / 42px 42px,
        linear-gradient(rgba(242, 239, 232, 0.026) 1px, transparent 1px) 0 0 / 42px 42px,
        radial-gradient(circle at 18% -10%, rgba(213, 255, 79, 0.16), transparent 30rem),
        var(--ink);
      color: var(--paper);
      font-family: ui-serif, "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    }

    button,
    input {
      font: inherit;
    }

    button {
      color: inherit;
    }

    .shell {
      width: min(1500px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    .masthead {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      min-height: 176px;
      padding: 26px 0 22px;
      border-bottom: 1px solid var(--line-strong);
    }

    .mark {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
      color: var(--paper-dim);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .mark::before {
      content: "";
      width: 34px;
      height: 10px;
      background: var(--accent);
      box-shadow: 14px 0 0 var(--accent-2);
    }

    h1 {
      margin: 0;
      max-width: 780px;
      font-size: clamp(24px, 4vw, 62px);
      line-height: 0.82;
      letter-spacing: 0;
      font-weight: 500;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(82px, 1fr));
      gap: 10px;
      width: min(410px, 100%);
    }

    .stat {
      padding: 14px 12px;
      border: 1px solid var(--line);
      background: rgba(17, 17, 15, 0.68);
    }

    .stat strong {
      display: block;
      color: var(--accent);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 22px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 8px;
      color: var(--paper-dim);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
      padding: 16px 0;
      background: rgba(17, 17, 15, 0.86);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .crumbs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
    }

    .crumb {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      border: 1px solid var(--line);
      background: rgba(242, 239, 232, 0.055);
      padding: 0 12px;
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .crumb:hover,
    .action:hover {
      border-color: var(--accent);
      background: rgba(213, 255, 79, 0.1);
      transform: translateY(-1px);
    }

    .crumb .slash {
      color: var(--accent);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .tools {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .url-mode {
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(58px, 1fr));
      min-height: 36px;
      border: 1px solid var(--line);
      background: rgba(242, 239, 232, 0.055);
    }

    .mode-option {
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
      color: var(--paper-dim);
      padding: 0 10px;
      cursor: pointer;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      text-transform: uppercase;
    }

    .mode-option:last-child {
      border-right: 0;
    }

    .mode-option.is-active {
      background: var(--accent);
      color: var(--ink);
    }

    .action {
      min-height: 36px;
      border: 1px solid var(--line);
      background: rgba(242, 239, 232, 0.055);
      padding: 0 12px;
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .search {
      width: min(280px, 32vw);
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 0;
      background: rgba(242, 239, 232, 0.08);
      color: var(--paper);
      padding: 0 12px;
      outline: none;
    }

    .search::placeholder {
      color: rgba(201, 193, 178, 0.72);
    }

    .search:focus {
      border-color: var(--accent);
    }

    .content {
      padding-top: 22px;
    }

    .section {
      margin-top: 28px;
    }

    .section:first-child {
      margin-top: 0;
    }

    .section-title {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin: 0 0 12px;
      color: var(--paper-dim);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .folder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 12px;
    }

    .folder-card {
      min-height: 118px;
      border: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(242, 239, 232, 0.09), rgba(242, 239, 232, 0.035));
      padding: 16px;
      cursor: pointer;
      transition: border-color 160ms ease, transform 160ms ease, background 160ms ease;
    }

    .folder-card:hover {
      border-color: var(--accent);
      background: linear-gradient(135deg, rgba(213, 255, 79, 0.16), rgba(242, 239, 232, 0.04));
      transform: translateY(-2px);
    }

    .folder-kicker {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--paper-dim);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      text-transform: uppercase;
    }

    .folder-name {
      margin-top: 26px;
      font-size: 28px;
      line-height: 1;
      word-break: break-word;
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }

    .image-card,
    .file-card {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      background: rgba(242, 239, 232, 0.06);
      box-shadow: var(--shadow);
      animation: lift 420ms ease both;
    }

    .image-card,
    .file-card {
      display: grid;
      grid-template-rows: 132px 1fr;
      height: 250px;
      cursor: pointer;
    }

    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 14px;
    }

    @keyframes lift {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .thumb {
      display: block;
      width: 100%;
      height: 132px;
      object-fit: contain;
      background: #252520;
    }

    .image-meta,
    .file-meta {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .image-name,
    .file-name {
      min-height: 0;
      color: var(--paper);
      font-size: 14px;
      line-height: 1.25;
      word-break: break-word;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .image-actions,
    .file-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
    }

    .file-preview {
      display: flex;
      align-items: flex-start;
      padding: 28px;
      background: rgba(37, 37, 32, 0.72);
    }

    .file-badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border: 1px solid var(--line-strong);
      color: var(--accent);
      padding: 0 9px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      text-transform: uppercase;
    }

    .mini {
      min-height: 32px;
      border: 1px solid var(--line);
      background: rgba(17, 17, 15, 0.64);
      color: var(--paper-dim);
      cursor: pointer;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
    }

    .mini:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .notice {
      display: grid;
      place-items: center;
      min-height: 260px;
      border: 1px solid var(--line);
      background: rgba(242, 239, 232, 0.045);
      color: var(--paper-dim);
      text-align: center;
      padding: 32px;
    }

    .notice strong {
      display: block;
      margin-bottom: 8px;
      color: var(--paper);
      font-size: 26px;
      font-weight: 500;
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 50;
      max-width: min(420px, calc(100vw - 44px));
      border: 1px solid var(--accent);
      background: var(--ink-soft);
      color: var(--paper);
      padding: 12px 14px;
      box-shadow: var(--shadow);
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .preview-dialog {
      width: min(1100px, calc(100vw - 30px));
      max-height: min(860px, calc(100vh - 30px));
      border: 1px solid var(--line-strong);
      background: #10100e;
      color: var(--paper);
      padding: 0;
      box-shadow: var(--shadow);
    }

    .preview-dialog::backdrop {
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(12px);
    }

    .preview-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .preview-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 18px;
    }

    .preview-controls {
      display: flex;
      gap: 8px;
    }

    .preview-body {
      padding: 16px;
      overflow: auto;
      max-height: calc(100vh - 118px);
    }

    .preview-body img,
    .preview-body video,
    .preview-body iframe {
      display: block;
      width: 100%;
      max-height: calc(100vh - 160px);
      border: 0;
      background: #252520;
    }

    .preview-body img {
      object-fit: contain;
    }

    .preview-body iframe {
      min-height: min(720px, calc(100vh - 170px));
    }

    .preview-body audio {
      width: 100%;
      margin-top: 18px;
    }

    .text-preview {
      margin: 0;
      min-height: 360px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--paper);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.58;
    }

    .fallback-preview {
      display: grid;
      place-items: center;
      min-height: 320px;
      color: var(--paper-dim);
      text-align: center;
    }

    @media (max-width: 780px) {
      .shell {
        width: min(100vw - 22px, 1500px);
        padding-top: 14px;
      }

      .masthead,
      .toolbar {
        grid-template-columns: 1fr;
      }

      .masthead {
        min-height: 0;
      }

      .stats {
        grid-template-columns: repeat(3, 1fr);
        width: 100%;
      }

      .tools {
        justify-content: stretch;
        flex-wrap: wrap;
      }

      .search {
        width: 100%;
        flex: 1 1 100%;
      }

      .action {
        white-space: nowrap;
      }

      .folder-grid,
      .image-grid,
      .file-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }

      .folder-name {
        font-size: 22px;
      }

      .file-actions,
      .image-actions {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="masthead">
      <div>
        <div class="mark">&nbspgithub pages file bed</div>
        <h1>LOU-BED</h1>
      </div>
      <div class="stats" aria-live="polite">
        <div class="stat">
          <strong id="statDirs">0</strong>
          <span>folders</span>
        </div>
        <div class="stat">
          <strong id="statImages">0</strong>
          <span>files</span>
        </div>
        <div class="stat">
          <strong id="statPath">/</strong>
          <span>current</span>
        </div>
      </div>
    </header>

    <nav class="toolbar" aria-label="目录导航">
      <div id="crumbs" class="crumbs"></div>
      <div class="tools">
        <div class="url-mode" aria-label="文件链接模式">
          <button id="modeRaw" class="mode-option" type="button" data-url-mode="raw">Raw</button>
          <button id="modePages" class="mode-option" type="button" data-url-mode="pages">Pages</button>
        </div>
        <input id="search" class="search" type="search" placeholder="Filter current folder">
        <button id="copyDir" class="action" type="button">Copy path</button>
      </div>
    </nav>

    <main id="content" class="content" aria-live="polite"></main>
  </div>

  <div id="toast" class="toast" role="status"></div>
  <dialog id="previewDialog" class="preview-dialog">
    <div class="preview-head">
      <div id="previewTitle" class="preview-title"></div>
      <div class="preview-controls">
        <button id="previewOpen" class="mini" type="button">Open</button>
        <button id="previewCopy" class="mini" type="button">URL</button>
        <button id="previewClose" class="mini" type="button">Close</button>
      </div>
    </div>
    <div id="previewBody" class="preview-body"></div>
  </dialog>

  <script>
    const OWNER = "lyloou";
    const REPO = "bed";
    const BRANCH = "master";
    const PAGE_BASE = "https://lyloou.github.io/bed/";
    const RAW_BASE = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/`;
    const URL_MODE_KEY = "bed:urlBaseMode";
    const API_BASE = `https://api.github.com/repos/${OWNER}/${REPO}/contents`;
    const IMAGE_EXTS = [".jpg", ".jpeg", ".png", ".gif", ".webp", ".avif", ".svg", ".bmp"];
    const VIDEO_EXTS = [".mp4", ".webm", ".mov", ".m4v", ".ogg"];
    const AUDIO_EXTS = [".mp3", ".wav", ".flac", ".m4a", ".aac", ".oga"];
    const TEXT_EXTS = [".txt", ".md", ".json", ".xml", ".csv", ".tsv", ".log", ".yml", ".yaml", ".ini", ".conf", ".css", ".js", ".html"];
    const TEXT_PREVIEW_LIMIT = 512 * 1024;

    const state = {
      path: "",
      items: [],
      query: "",
      urlMode: readUrlMode()
    };

    const els = {
      content: document.getElementById("content"),
      crumbs: document.getElementById("crumbs"),
      modeRaw: document.getElementById("modeRaw"),
      modePages: document.getElementById("modePages"),
      search: document.getElementById("search"),
      copyDir: document.getElementById("copyDir"),
      statDirs: document.getElementById("statDirs"),
      statImages: document.getElementById("statImages"),
      statPath: document.getElementById("statPath"),
      toast: document.getElementById("toast"),
      previewDialog: document.getElementById("previewDialog"),
      previewTitle: document.getElementById("previewTitle"),
      previewBody: document.getElementById("previewBody"),
      previewOpen: document.getElementById("previewOpen"),
      previewCopy: document.getElementById("previewCopy"),
      previewClose: document.getElementById("previewClose")
    };

    function hasExt(name, exts) {
      const lower = name.toLowerCase();
      return exts.some(ext => lower.endsWith(ext));
    }

    function isImage(name) {
      return hasExt(name, IMAGE_EXTS);
    }

    function fileType(name) {
      if (isImage(name)) {
        return "image";
      }
      if (hasExt(name, VIDEO_EXTS)) {
        return "video";
      }
      if (hasExt(name, AUDIO_EXTS)) {
        return "audio";
      }
      if (hasExt(name, [".pdf"])) {
        return "pdf";
      }
      if (hasExt(name, TEXT_EXTS)) {
        return "text";
      }
      return "file";
    }

    function fileExt(name) {
      const index = name.lastIndexOf(".");
      if (index < 0 || index === name.length - 1) {
        return "file";
      }
      return name.slice(index + 1).toLowerCase();
    }

    function readUrlMode() {
      try {
        return localStorage.getItem(URL_MODE_KEY) === "pages" ? "pages" : "raw";
      } catch (error) {
        return "raw";
      }
    }

    function saveUrlMode(mode) {
      state.urlMode = mode === "pages" ? "pages" : "raw";
      try {
        localStorage.setItem(URL_MODE_KEY, state.urlMode);
      } catch (error) {
        showToast("浏览器没有开放本地存储权限");
      }
    }

    function fileUrl(path) {
      const base = state.urlMode === "pages" ? PAGE_BASE : RAW_BASE;
      return base + path.split("/").map(encodeURIComponent).join("/");
    }

    function renderUrlMode() {
      els.modeRaw.classList.toggle("is-active", state.urlMode === "raw");
      els.modePages.classList.toggle("is-active", state.urlMode === "pages");
    }

    function pathFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return (params.get("path") || "").replace(/^\/+|\/+$/g, "");
    }

    function pageBrowseUrl(path) {
      const url = new URL(window.location.href);
      if (path) {
        url.searchParams.set("path", path);
      } else {
        url.searchParams.delete("path");
      }
      return url.toString();
    }

    function syncUrl(path, replace) {
      const nextUrl = pageBrowseUrl(path);
      if (nextUrl === window.location.href) {
        return;
      }
      const method = replace ? "replaceState" : "pushState";
      window.history[method]({ path }, "", nextUrl);
    }

    function labelFolder(name) {
      if (/^\d{4}$/.test(name)) {
        return "year";
      }
      if (/^\d{6}$/.test(name)) {
        return `${name.slice(0, 4)}-${name.slice(4, 6)}`;
      }
      if (/^\d{4}-\d{2}$/.test(name)) {
        return "month";
      }
      return "folder";
    }

    function sortItems(items) {
      return items.slice().sort((a, b) => {
        if (a.type !== b.type) {
          return a.type === "dir" ? -1 : 1;
        }
        return a.name.localeCompare(b.name, "zh-Hans-CN", { numeric: true });
      });
    }

    function visibleItems() {
      const query = state.query.trim().toLowerCase();
      const items = state.items.filter(item => item.type === "dir" || item.type === "file");
      if (!query) {
        return sortItems(items);
      }
      return sortItems(items.filter(item => item.name.toLowerCase().includes(query)));
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => {
        els.toast.classList.remove("show");
      }, 1800);
    }

    async function copyText(text, doneMessage) {
      try {
        await navigator.clipboard.writeText(text);
        showToast(doneMessage);
      } catch (error) {
        showToast("复制失败，浏览器没有开放剪贴板权限");
      }
    }

    function renderCrumbs() {
      const parts = state.path ? state.path.split("/") : [];
      els.crumbs.innerHTML = "";

      const root = document.createElement("button");
      root.className = "crumb";
      root.type = "button";
      root.innerHTML = "<span class=\"slash\">/</span><span>root</span>";
      root.addEventListener("click", () => loadDir(""));
      els.crumbs.appendChild(root);

      let current = "";
      parts.forEach(part => {
        current = current ? `${current}/${part}` : part;
        const targetPath = current;
        const button = document.createElement("button");
        button.className = "crumb";
        button.type = "button";
        button.innerHTML = `<span class="slash">/</span><span>${escapeHtml(part)}</span>`;
        button.addEventListener("click", () => loadDir(targetPath));
        els.crumbs.appendChild(button);
      });
    }

    function renderStats(dirs, files) {
      els.statDirs.textContent = String(dirs);
      els.statImages.textContent = String(files);
      els.statPath.textContent = state.path ? state.path.split("/").pop() : "/";
    }

    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function renderNotice(title, body) {
      els.content.innerHTML = `
        <div class="notice">
          <div>
            <strong>${escapeHtml(title)}</strong>
            <span>${escapeHtml(body)}</span>
          </div>
        </div>
      `;
    }

    function render() {
      renderUrlMode();
      renderCrumbs();

      const items = visibleItems();
      const dirs = items.filter(item => item.type === "dir");
      const files = items.filter(item => item.type === "file");
      const images = files.filter(item => isImage(item.name));
      const otherFiles = files.filter(item => !isImage(item.name));
      renderStats(dirs.length, files.length);

      if (!items.length) {
        renderNotice("No visible files", state.query ? "当前筛选条件下没有匹配内容。" : "这个目录暂时没有可展示的目录或文件。");
        return;
      }

      const fragments = [];

      if (dirs.length) {
        fragments.push(`
          <section class="section">
            <h2 class="section-title">folders · ${dirs.length}</h2>
            <div class="folder-grid">
              ${dirs.map(renderFolder).join("")}
            </div>
          </section>
        `);
      }

      if (images.length) {
        fragments.push(`
          <section class="section">
            <h2 class="section-title">images · ${images.length}</h2>
            <div class="image-grid">
              ${images.map(renderImage).join("")}
            </div>
          </section>
        `);
      }

      if (otherFiles.length) {
        fragments.push(`
          <section class="section">
            <h2 class="section-title">files · ${otherFiles.length}</h2>
            <div class="file-grid">
              ${otherFiles.map(renderFile).join("")}
            </div>
          </section>
        `);
      }

      els.content.innerHTML = fragments.join("");
      bindCards();
    }

    function renderFolder(item) {
      return `
        <button class="folder-card" type="button" data-folder="${escapeHtml(item.path)}">
          <span class="folder-kicker">
            <span>${escapeHtml(labelFolder(item.name))}</span>
            <span>open</span>
          </span>
          <span class="folder-name">${escapeHtml(item.name)}</span>
        </button>
      `;
    }

    function renderImage(item) {
      const url = fileUrl(item.path);
      return `
        <article class="image-card" data-card-preview="${escapeHtml(item.path)}">
          <img class="thumb" src="${escapeHtml(url)}" alt="${escapeHtml(item.name)}" loading="lazy">
          <div class="image-meta">
            <div class="image-name">${escapeHtml(item.name)}</div>
            <div class="image-actions">
              <button class="mini" type="button" data-preview="${escapeHtml(item.path)}">Preview</button>
              <button class="mini" type="button" data-open="${escapeHtml(url)}">Open</button>
              <button class="mini" type="button" data-copy="${escapeHtml(url)}">URL</button>
              <button class="mini" type="button" data-md="${escapeHtml(`![${item.name}](${url})`)}">MD</button>
            </div>
          </div>
        </article>
      `;
    }

    function renderFile(item) {
      const url = fileUrl(item.path);
      return `
        <article class="file-card" data-card-preview="${escapeHtml(item.path)}">
          <div class="file-preview">
            <span class="file-badge">${escapeHtml(fileExt(item.name))}</span>
          </div>
          <div class="file-meta">
            <div class="file-name">${escapeHtml(item.name)}</div>
            <div class="file-actions">
              <button class="mini" type="button" data-preview="${escapeHtml(item.path)}">Preview</button>
              <button class="mini" type="button" data-open="${escapeHtml(url)}">Open</button>
              <button class="mini" type="button" data-copy="${escapeHtml(url)}">URL</button>
              <button class="mini" type="button" data-md="${escapeHtml(`[${item.name}](${url})`)}">MD</button>
            </div>
          </div>
        </article>
      `;
    }

    function bindCards() {
      document.querySelectorAll("[data-card-preview]").forEach(card => {
        card.addEventListener("click", () => {
          const item = state.items.find(entry => entry.path === card.dataset.cardPreview);
          if (item) {
            openPreview(item);
          }
        });
      });

      document.querySelectorAll("[data-folder]").forEach(button => {
        button.addEventListener("click", () => loadDir(button.dataset.folder));
      });

      document.querySelectorAll("[data-open]").forEach(button => {
        button.addEventListener("click", event => {
          event.stopPropagation();
          window.open(button.dataset.open, "_blank", "noopener");
        });
      });

      document.querySelectorAll("[data-copy]").forEach(button => {
        button.addEventListener("click", event => {
          event.stopPropagation();
          copyText(button.dataset.copy, "已复制文件 URL");
        });
      });

      document.querySelectorAll("[data-md]").forEach(button => {
        button.addEventListener("click", event => {
          event.stopPropagation();
          copyText(button.dataset.md, "已复制 Markdown 语法");
        });
      });

      document.querySelectorAll("[data-preview]").forEach(button => {
        button.addEventListener("click", event => {
          event.stopPropagation();
          const item = state.items.find(entry => entry.path === button.dataset.preview);
          if (item) {
            openPreview(item);
          }
        });
      });
    }

    async function openPreview(item) {
      const url = fileUrl(item.path);
      const type = fileType(item.name);

      els.previewTitle.textContent = item.path;
      els.previewBody.innerHTML = "";
      els.previewOpen.onclick = () => window.open(url, "_blank", "noopener");
      els.previewCopy.onclick = () => copyText(url, "已复制文件 URL");

      if (type === "image") {
        els.previewBody.innerHTML = `<img src="${escapeHtml(url)}" alt="${escapeHtml(item.name)}">`;
      } else if (type === "video") {
        els.previewBody.innerHTML = `<video src="${escapeHtml(url)}" controls preload="metadata"></video>`;
      } else if (type === "audio") {
        els.previewBody.innerHTML = `
          <div class="fallback-preview">
            <div>
              <strong>${escapeHtml(item.name)}</strong>
              <audio src="${escapeHtml(url)}" controls preload="metadata"></audio>
            </div>
          </div>
        `;
      } else if (type === "pdf") {
        els.previewBody.innerHTML = `<iframe src="${escapeHtml(url)}" title="${escapeHtml(item.name)}"></iframe>`;
      } else if (type === "text") {
        await previewText(item, url);
      } else {
        els.previewBody.innerHTML = `
          <div class="fallback-preview">
            <div>
              <strong>${escapeHtml(fileExt(item.name).toUpperCase())}</strong>
              <p>这个格式不适合在浏览器里直接预览，可以打开原文件或复制链接使用。</p>
            </div>
          </div>
        `;
      }

      if (!els.previewDialog.open) {
        els.previewDialog.showModal();
      }
    }

    async function previewText(item, url) {
      if (item.size && item.size > TEXT_PREVIEW_LIMIT) {
        els.previewBody.innerHTML = `
          <div class="fallback-preview">
            <div>
              <strong>Text file is large</strong>
              <p>文件超过 512KB，为避免页面卡顿，请打开原文件查看。</p>
            </div>
          </div>
        `;
        return;
      }

      els.previewBody.innerHTML = `
        <div class="fallback-preview">
          <div>
            <strong>Loading text</strong>
            <p>正在读取文本内容...</p>
          </div>
        </div>
      `;

      try {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`Text preview returned ${response.status}`);
        }
        const text = await response.text();
        els.previewBody.innerHTML = `<pre class="text-preview">${escapeHtml(text)}</pre>`;
      } catch (error) {
        els.previewBody.innerHTML = `
          <div class="fallback-preview">
            <div>
              <strong>Preview failed</strong>
              <p>${escapeHtml(error.message)}。可以打开原文件查看。</p>
            </div>
          </div>
        `;
      }
    }

    async function loadDir(path, options = {}) {
      state.path = path || "";
      state.query = "";
      els.search.value = "";
      if (options.sync !== false) {
        syncUrl(state.path, options.replace === true);
      }
      renderCrumbs();
      renderNotice("Loading", "正在读取 GitHub 仓库目录...");

      const apiPath = state.path ? `/${state.path}` : "";
      const apiUrl = `${API_BASE}${apiPath}?ref=${BRANCH}`;

      try {
        const response = await fetch(apiUrl);
        if (!response.ok) {
          throw new Error(`GitHub API returned ${response.status}`);
        }

        const data = await response.json();
        state.items = Array.isArray(data) ? data : [];
        render();
      } catch (error) {
        state.items = [];
        renderStats(0, 0);
        renderNotice("Directory unavailable", `${error.message}。如果仓库是私有仓库，GitHub Pages 页面无法匿名读取目录。`);
      }
    }

    els.search.addEventListener("input", event => {
      state.query = event.target.value;
      render();
    });

    document.querySelectorAll("[data-url-mode]").forEach(button => {
      button.addEventListener("click", () => {
        saveUrlMode(button.dataset.urlMode);
        renderUrlMode();
        render();
        showToast(state.urlMode === "pages" ? "文件链接已切换为 Pages" : "文件链接已切换为 Raw");
      });
    });

    els.copyDir.addEventListener("click", () => {
      copyText(pageBrowseUrl(state.path), "已复制当前目录链接");
    });

    els.previewClose.addEventListener("click", () => {
      els.previewDialog.close();
    });

    els.previewDialog.addEventListener("click", event => {
      if (event.target === els.previewDialog) {
        els.previewDialog.close();
      }
    });

    els.previewDialog.addEventListener("close", () => {
      els.previewBody.innerHTML = "";
    });

    window.addEventListener("popstate", () => {
      loadDir(pathFromUrl(), { sync: false });
    });

    renderUrlMode();
    loadDir(pathFromUrl(), { replace: true });
  </script>
</body>
</html>
